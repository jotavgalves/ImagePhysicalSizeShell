name: Windows Build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -A x64

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release

      - name: Test
        shell: pwsh
        run: ctest --test-dir build -C Release --output-on-failure

